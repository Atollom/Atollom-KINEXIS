[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Pure unit tests — no I/O, no external services
    integration: Integration tests — may hit real services or DB
    slow: Tests that take >1s to run
