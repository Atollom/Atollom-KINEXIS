name: CI — Quality Checks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Frontend: TypeScript + ESLint + Vitest ──────────────────────────────────
  frontend-checks:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: TypeScript build check
        working-directory: src/dashboard
        run: npm run type-check

      - name: ESLint
        working-directory: src/dashboard
        run: npm run lint

      - name: Vitest unit tests
        working-directory: src/dashboard
        run: npm run test:unit
        env:
          NODE_ENV: test

  # ── Backend: pytest ─────────────────────────────────────────────────────────
  backend-checks:
    name: Backend Quality
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=html
        env:
          PYTHONPATH: .
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          ANTHROPIC_API_KEY: test-anthropic-key
          GOOGLE_API_KEY: test-google-key
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7

  # ── E2E: Playwright (chromium only) ────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: src/dashboard
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: src/dashboard
        run: npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BYPASS_AUTH: 'true'
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/dashboard/playwright-report/
          retention-days: 7

  # ── Security: Trivy filesystem scan ────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  # ── Status gate: fails pipeline if any required job fails ──────────────────
  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks, e2e-tests, security-scan]
    if: always()

    steps:
      - name: Evaluate results
        run: |
          frontend="${{ needs.frontend-checks.result }}"
          backend="${{ needs.backend-checks.result }}"
          e2e="${{ needs.e2e-tests.result }}"

          echo "Frontend checks: $frontend"
          echo "Backend checks:  $backend"
          echo "E2E tests:       $e2e"

          if [ "$frontend" != "success" ] || [ "$backend" != "success" ] || [ "$e2e" != "success" ]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi

          echo "✅ All required checks passed"
