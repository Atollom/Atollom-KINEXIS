name: Weekly Database Backup

on:
  schedule:
    - cron: '0 0 * * 0'  # Domingos a medianoche
  workflow_dispatch:  # Manual también

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Backup database
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump "postgresql://postgres:$DB_PASSWORD@db.smgxbqkfxqbnmytalpos.supabase.co:5432/postgres" \
            --no-owner --no-acl > backup.sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backup.sql
          retention-days: 30
